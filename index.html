<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI-Readiness Grader — is your site ready for AI agents & LLM crawlers?</title>
<meta name="description" content="Grade any website on the signals that decide whether ChatGPT, Claude, Perplexity and AI agents can find, read, and cite it. Free.">
<meta property="og:title" content="AI-Readiness Grader">
<meta property="og:description" content="Is your website ready for AI agents & LLM crawlers? Get a free score + badge.">
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 0;
         background: #0d1117; color: #e6edf3; line-height: 1.5; }
  .wrap { max-width: 720px; margin: 0 auto; padding: 48px 20px 80px; }
  h1 { font-size: 30px; margin: 0 0 8px; }
  p.sub { color: #9aa4af; margin: 0 0 28px; }
  form { display: flex; gap: 8px; }
  input { flex: 1; padding: 12px 14px; font-size: 16px; border-radius: 8px;
          border: 1px solid #30363d; background: #161b22; color: #e6edf3; }
  button { padding: 12px 20px; font-size: 16px; border: 0; border-radius: 8px;
           background: #6e40c9; color: #fff; cursor: pointer; font-weight: 600; }
  button:disabled { opacity: .6; cursor: default; }
  .card { margin-top: 28px; background: #161b22; border: 1px solid #30363d;
          border-radius: 12px; padding: 22px; display: none; }
  .scorerow { display: flex; align-items: center; gap: 16px; margin-bottom: 8px; }
  .grade { font-size: 44px; font-weight: 800; width: 64px; height: 64px; border-radius: 12px;
           display: grid; place-items: center; color: #fff; }
  .score { font-size: 15px; color: #9aa4af; }
  .check { display: flex; gap: 10px; padding: 7px 0; border-top: 1px solid #21262d; }
  .mark { font-weight: 700; width: 22px; flex: none; }
  .pass { color: #3fb950; } .fail { color: #f85149; }
  .rec { color: #9aa4af; font-size: 14px; margin-left: 32px; }
  .embed { margin-top: 22px; }
  textarea { width: 100%; height: 78px; background: #0d1117; color: #e6edf3;
             border: 1px solid #30363d; border-radius: 8px; padding: 10px; font-family: monospace; font-size: 12px; }
  a { color: #79c0ff; }
  footer { margin-top: 48px; color: #6e7781; font-size: 14px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Is your site ready for AI?</h1>
  <p class="sub">Grade any website on the signals that decide whether ChatGPT, Claude,
     Perplexity &amp; AI agents can find, read, and cite it. Free, no signup.</p>
  <form id="f">
    <input id="u" type="text" placeholder="yoursite.com" autocomplete="off" autofocus>
    <button id="b" type="submit">Grade it</button>
  </form>
  <div class="card" id="card"></div>
  <footer>
    By <a href="https://github.com/mujinlabs">Mujin Labs</a> ·
    <a href="https://pypi.org/project/mujin-airready/">CLI</a> ·
    checks llms.txt, AI-bot policy, structured data, SSR content &amp; more.
  </footer>
</div>
<script>
const COLORS={A:"#2ea44f",B:"#3fb950",C:"#bf8700",D:"#e8590c",F:"#cf222e","?":"#6e7781"};
const f=document.getElementById('f'),u=document.getElementById('u'),
      b=document.getElementById('b'),card=document.getElementById('card');
f.addEventListener('submit',async e=>{
  e.preventDefault();
  const url=u.value.trim(); if(!url) return;
  b.disabled=true; b.textContent='Grading…'; card.style.display='block';
  card.innerHTML='<p class="score">Fetching and grading…</p>';
  try{
    const r=await fetch('/api/scan?url='+encodeURIComponent(url));
    const d=await r.json();
    if(d.error){ card.innerHTML='<p class="fail">Could not grade: '+d.error+'</p>'; return; }
    render(d);
  }catch(err){ card.innerHTML='<p class="fail">Error: '+err+'</p>'; }
  finally{ b.disabled=false; b.textContent='Grade it'; }
});
function esc(s){return (s+'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function render(d){
  const g=d.grade, color=COLORS[g]||COLORS['?'];
  let h=`<div class="scorerow"><div class="grade" style="background:${color}">${g}</div>
    <div><div style="font-size:20px;font-weight:700">${d.score}/100</div>
    <div class="score">${esc(d.final_url)}</div></div></div>`;
  for(const c of d.checks){
    h+=`<div class="check"><span class="mark ${c.passed?'pass':'fail'}">${c.passed?'✓':'✕'}</span>
        <span><b>${esc(c.label)}</b> <span class="score">+${c.weight} · ${esc(c.detail)}</span>
        ${c.passed?'':`<div class="rec">→ ${esc(c.recommendation)}</div>`}</span></div>`;
  }
  const origin=location.origin;
  const link=origin+'/?url='+encodeURIComponent(d.url);
  const img=origin+'/api/badge?grade='+g+'&score='+d.score;
  const snippet=`<a href="${link}"><img src="${img}" alt="AI-Ready: ${g}"></a>`;
  h+=`<div class="embed"><b>Embed your badge</b> (links back to this report):<br>
      <img src="${img}" alt="badge" style="margin:8px 0"><br>
      <textarea readonly onclick="this.select()">${esc(snippet)}</textarea></div>`;
  card.innerHTML=h;
}
</script>
</body>
</html>
